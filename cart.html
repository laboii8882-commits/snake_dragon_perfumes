<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shopping Cart - Snake Dragon</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Cart Section */
    #cart {
      padding: 60px 20px;
      text-align: center;
      color: #f5d76e;
    }

    .cart-container div {
      background: #111;
      border: 1px solid #f5d76e;
      border-radius: 8px;
      margin: 10px auto;
      padding: 12px;
      max-width: 400px;
      animation: slideIn 0.6s ease; /* animate items when they appear */
      transition: transform 0.3s ease, opacity 0.3s ease;
      color: #f5d76e;
    }

    .cart-container div:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(245,215,110,0.5);
    }

    /* Remove button animation */
    .cart-container button {
      background: #f5d76e;
      border: none;
      padding: 6px 12px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.3s ease;
      font-weight: bold;
      color: #000;
    }

    .cart-container button:hover {
      background: #fff;
      color: #000;
      transform: scale(1.1);
    }

    /* Checkout button */
    .btn {
      background: #f5d76e;
      color: #000;
      padding: 12px 25px;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      display: inline-block;
      margin-top: 20px;
      transition: transform 0.3s ease, background 0.3s ease;
      animation: fadeInUp 1.2s ease;
    }

    .btn:hover {
      background: #fff;
      color: #000;
      transform: scale(1.1);
    }

    /* Keyframes */
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <section id="cart">
    <h2 class="animated-title">Your Shopping Cart</h2>
    <div id="cart-items" class="cart-container"></div>
    <p id="cart-total">Total: ₹0</p>
    <a href="checkout.html" class="btn">Proceed to Checkout</a>
  </section>

  <script src="script.js"></script>
  <script>
    displayCart("cart-items", "cart-total");
  </script>
</body>
</html>
