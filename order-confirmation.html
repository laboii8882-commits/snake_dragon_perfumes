<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Confirmation - Snake Dragon</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: #000;
      color: #f5d76e;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
    }

    .confirmation-box {
      border: 2px solid #f5d76e;
      border-radius: 12px;
      padding: 30px;
      display: inline-block;
      animation: fadeInUp 1.5s ease;
    }

    h2 {
      font-size: 2em;
      margin-bottom: 10px;
      animation: pulse 2s infinite;
    }

    p {
      margin: 10px 0;
      animation: fadeIn 2s ease;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      background: #f5d76e;
      color: #000;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.3s ease, background 0.3s ease;
      animation: fadeInUp 2s ease;
    }

    .btn:hover {
      transform: scale(1.1);
      background: #fff;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="confirmation-box">
    <h2>🎉 Order Confirmed!</h2>
    <p>Thank you for shopping with Snake Dragon Perfumes.</p>
    <p>Your order has been placed successfully.</p>
    <button class="btn" onclick="window.location.href='index.html'">Back to Home</button>
  </div>
</body>
</html>
