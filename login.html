<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login - Snake Dragon</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Animations */
    #login h2 {
      color: #f5d76e;
      animation: fadeInDown 1s ease;
    }

    #login form {
      max-width: 400px;
      margin: 20px auto;
      display: flex;
      flex-direction: column;
      animation: fadeInUp 1.2s ease;
    }

    #login input {
      margin-bottom: 15px;
      padding: 12px;
      border: 1px solid #f5d76e;
      border-radius: 6px;
      background: #000;
      color: #f5d76e;
      animation: fadeIn 1.5s ease;
      transition: box-shadow 0.3s ease;
    }

    #login input:focus {
      box-shadow: 0 0 12px rgba(245,215,110,0.8);
    }

    #login button {
      background: #f5d76e;
      color: #000;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.3s ease, background 0.3s ease;
      animation: fadeInUp 1.5s ease;
    }

    #login button:hover {
      background: #fff;
      color: #000;
      transform: scale(1.1);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  
<section id="login">
  <h2>Admin Login</h2>
  <form id="login-form">
    <input type="email" id="login-email" placeholder="Admin Email" required>
    <input type="password" id="login-password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
</section>

<script>
  // Fixed admin credentials
  const adminEmail = "admin@snake.com";
  const adminPassword = "snake123";

  document.getElementById("login-form").addEventListener("submit", function(e) {
    e.preventDefault();
    const email = document.getElementById("login-email").value;
    const password = document.getElementById("login-password").value;

    if (email === adminEmail && password === adminPassword) {
      alert("Welcome Admin! Redirecting to Admin Panel...");
      window.location.href = "admin.html"; // redirect to your admin panel
    } else {
      alert("Invalid admin credentials. Access denied.");
    }
  });
</script>

</body>
</html>
