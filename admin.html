<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - Snake Dragon</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: #000 url(images/logo.png) no-repeat center center fixed;
      /* 👆 Place your logo file in an "images" folder inside your project */
      background-size: 70%; /* Adjust size as needed */
      color: #f5d76e;
      font-family: Arial, sans-serif;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); /* dark overlay for readability */
      z-index: -1;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      max-width: 600px;
    }

    .btn {
      margin-top: 30px;
      padding: 12px 20px;
      background: #f5d76e;
      color: #000;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.3s ease, background 0.3s ease;
    }
    .btn:hover {
      transform: scale(1.1);
      background: #fff;
    }
  </style>
</head>
<body>
</head>
<body>

  <h2>Admin Panel</h2>
  <button class="btn" onclick="window.location.href='index.html'">⬅ Back to Store</button>

  <!-- Product Management -->
  <section id="products">
    <h3>Add Product</h3>
    <form id="add-product-form">
      <input type="text" id="product-name" placeholder="Product Name" required>
      <input type="number" id="product-price" placeholder="Price" required>
      <!-- File input instead of URL -->
      <input type="file" id="product-image" accept="image/*" required>
      <button type="submit">Add Product</button>
    </form>
    <div class="product-list" id="product-list"></div>
  </section>

  <!-- Orders Management -->
  <section id="orders">
    <h3>Customer Orders</h3>
    <div class="order-list" id="order-list"></div>
  </section>

  <script>
    // Load products from localStorage
    function loadProducts() {
      const products = JSON.parse(localStorage.getItem("products")) || [];
      const list = document.getElementById("product-list");
      list.innerHTML = "";
      products.forEach((p, i) => {
        const div = document.createElement("div");
        div.className = "product-item";
        div.innerHTML = `
          <strong>${p.name}</strong> - ₹${p.price}
          <br><img src="${p.image}" alt="${p.name}">
          <br><button onclick="removeProduct(${i})">Remove</button>
        `;
        list.appendChild(div);
      });
    }

    // Add product with file upload
    document.getElementById("add-product-form").addEventListener("submit", function(e) {
      e.preventDefault();
      const name = document.getElementById("product-name").value;
      const price = document.getElementById("product-price").value;
      const file = document.getElementById("product-image").files[0];

      if (file) {
        const reader = new FileReader();
        reader.onloadend = function() {
          const imageBase64 = reader.result;
          const product = { name, price, image: imageBase64 };
          let products = JSON.parse(localStorage.getItem("products")) || [];
          products.push(product);
          localStorage.setItem("products", JSON.stringify(products));
          loadProducts();
          alert("Product added!");
        };
        reader.readAsDataURL(file);
      }
    });

    function removeProduct(index) {
      let products = JSON.parse(localStorage.getItem("products")) || [];
      products.splice(index, 1);
      localStorage.setItem("products", JSON.stringify(products));
      loadProducts();
    }

    // Load orders with Accept and Delete options
    function loadOrders() {
      const orders = JSON.parse(localStorage.getItem("orders")) || [];
      const list = document.getElementById("order-list");
      list.innerHTML = "";
      orders.forEach((o, i) => {
        const div = document.createElement("div");
        div.className = "order-item";
        div.innerHTML = `
          <strong>Order #${i+1}</strong><br>
          Customer: ${o.customer.name}<br>
          Total: ₹${o.total}<br>
          Status: ${o.status || "Pending"}<br>
          <button onclick="acceptOrder(${i})">Accept</button>
          <button onclick="deleteOrder(${i})">Delete</button>
        `;
        list.appendChild(div);
      });
    }

    function acceptOrder(index) {
      let orders = JSON.parse(localStorage.getItem("orders")) || [];
      orders[index].status = "Accepted";
      localStorage.setItem("orders", JSON.stringify(orders));
      loadOrders();
      alert("Order accepted!");
    }

    function deleteOrder(index) {
      let orders = JSON.parse(localStorage.getItem("orders")) || [];
      orders.splice(index, 1);
      localStorage.setItem("orders", JSON.stringify(orders));
      loadOrders();
      alert("Order deleted!");
    }

    loadProducts();
    loadOrders();
  </script>

</body>
</html>
